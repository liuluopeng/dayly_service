<!DOCTYPE html>
<html lang="zh-CN" class="bg-black text-white">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WASM Demo</title>
<link data-trunk rel="rust" href="Cargo.toml"/>
<link data-trunk rel="tailwind-css" href="src/input.css">
</head>
<body class="bg-black text-white font-sans min-h-screen">
  <div id="app" class="max-w-md mx-auto">
    <header class="bg-[#0078D4] px-5 py-3">
      <h1 class="text-2xl font-light text-white">WASM Demo</h1>
    </header>

    <div id="page-login" class="hidden p-6">
      <h2 class="text-xl font-light text-white mb-5">登录</h2>
      <input id="login-user" type="text" placeholder="用户名"
        class="block w-full bg-[#1A1A1A] text-white border-none px-3 py-2.5 text-[15px] mb-3 outline-none focus:border-b-2 focus:border-[#0078D4]">
      <input id="login-pass" type="password" placeholder="密码"
        class="block w-full bg-[#1A1A1A] text-white border-none px-3 py-2.5 text-[15px] mb-3 outline-none focus:border-b-2 focus:border-[#0078D4]">
      <button id="login-btn"
        class="block w-full bg-[#0078D4] text-white border-none px-3 py-2.5 text-[15px] cursor-pointer mb-2 hover:bg-[#006CBE] disabled:opacity-50 disabled:cursor-default">
        登录
      </button>
      <p id="login-msg" class="text-[#888] text-xs mt-2"></p>
    </div>

    <div id="page-app" class="hidden p-6">
      <h2 class="text-xl font-light text-white mb-5">五笔查询</h2>
      <input id="wubi-input" type="text" placeholder="输入汉字" maxlength="1"
        class="block w-full bg-[#1A1A1A] text-white border-none px-3 py-2.5 text-[15px] mb-3 outline-none focus:border-b-2 focus:border-[#0078D4]">
      <button id="wubi-btn"
        class="block w-full bg-[#0078D4] text-white border-none px-3 py-2.5 text-[15px] cursor-pointer mb-2 hover:bg-[#006CBE] disabled:opacity-50 disabled:cursor-default">
        查询
      </button>
      <div id="wubi-result" class="bg-[#1A1A1A] p-4 mt-3 text-sm whitespace-pre-wrap break-all min-h-12"></div>
      <button id="logout-btn"
        class="block w-full bg-[#2D2D2D] text-white border-none px-3 py-2.5 text-[15px] cursor-pointer mt-6 hover:bg-[#3D3D3D]">
        退出登录
      </button>
    </div>
  </div>
</body>
</html>
