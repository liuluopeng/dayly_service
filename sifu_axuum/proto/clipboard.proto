syntax = "proto3";

package clipboard;

service ClipboardHistory {
    rpc GetHistory(HistoryRequest) returns (HistoryResponse);
}

message HistoryRequest {
    int32 count = 1;
    string type_filter = 2;
    string search = 3;
}

message HistoryEntry {
    int64 id = 1;
    string entry_type = 2;
    optional string text_content = 3;
    optional string image_url = 4;
    optional string image_path = 5;
    string content_hash = 6;
    string created_at = 7;
}

message HistoryResponse {
    int32 code = 1;
    string message = 2;
    repeated HistoryEntry data = 3;
}
